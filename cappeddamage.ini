[CappedDamage]
; Master on/off switch for this plugin. 1 = enabled, 0 = disabled.
; When 0 the damage hook is NOT installed and the game runs exactly as
; if this plugin weren't present. Default 1
Enabled=1

; Length of the damage-cap window, in seconds. Default 3.0
WindowSeconds=3.0

; Max fraction of an actor's MAX health it can lose per window (0.0 - 1.0).
; 0.333 = one third. Default 0.333
HealthFraction=0.333

; Write a debug log (obse_cappeddamage.log in the game's root folder).
; 0 = off, 1 = on. Default 0
EnableLogging=0
